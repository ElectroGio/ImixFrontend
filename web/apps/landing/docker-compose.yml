name: imix-landing

# Deployment stack for the public Landing SPA (Vite + React) served by Nginx.
# Build context must be the pnpm workspace root (frontend/web) so the
# lockfile and workspace manifest are available.

services:
  landing:
    build:
    ports:
      - "${FRONTEND_HOST_PORT:-3005}:3000"
    image: imix-landing:latest
    restart: unless-stopped
    environment:
      # URL nginx uses to reach the backend API.
      # Inside dokploy-network the backend compose service `api` is reachable
      # by its service name. Override in Dokploy if the service was renamed.
      API_UPSTREAM: ${API_UPSTREAM:-http://api:8080}
    networks:
      - dokploy-network
    # Traefik routing (Dokploy's built-in Traefik reads these labels).
    # Override the host by setting LANDING_HOST in the Dokploy panel envs.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP router (port 80) → redirect to HTTPS
      - "traefik.http.routers.imix-landing.rule=Host(`${LANDING_HOST:-clients.imixnes.com}`)"
      - "traefik.http.routers.imix-landing.entrypoints=web"
      - "traefik.http.routers.imix-landing.middlewares=imix-landing-redirect"
      - "traefik.http.middlewares.imix-landing-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.imix-landing-redirect.redirectscheme.permanent=true"
      # HTTPS router (port 443) with Let's Encrypt
      - "traefik.http.routers.imix-landing-secure.rule=Host(`${LANDING_HOST:-clients.imixnes.com}`)"
      - "traefik.http.routers.imix-landing-secure.entrypoints=websecure"
      - "traefik.http.routers.imix-landing-secure.tls=true"
      - "traefik.http.routers.imix-landing-secure.tls.certresolver=letsencrypt"
      # Upstream service: nginx inside this container listens on 3000
      - "traefik.http.services.imix-landing.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true
