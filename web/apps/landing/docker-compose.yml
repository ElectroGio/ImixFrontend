name: imix-landing

# Deployment stack for the public Landing SPA (Vite + React) served by Nginx.
# Build context must be the pnpm workspace root (frontend/web) so the
# lockfile and workspace manifest are available.

services:
  landing:
    build:
      context: ../..                       # frontend/web (pnpm workspace root)
      dockerfile: apps/landing/Dockerfile
    image: imix-landing:latest
    restart: unless-stopped
    environment:
      # URL nginx uses to reach the backend API.
      # Inside dokploy-network the backend compose service `api` is reachable
      # by its service name. Override in Dokploy if the service was renamed.
      API_UPSTREAM: ${API_UPSTREAM:-http://api:8080}
    ports:
      - "${LANDING_PORT:-8082}:80"
    networks:
      - dokploy-network
    # Uncomment when using Dokploy's built-in Traefik:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.imix-landing.rule=Host(`www.example.com`)"
    #   - "traefik.http.routers.imix-landing.entrypoints=websecure"
    #   - "traefik.http.routers.imix-landing.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.imix-landing.loadbalancer.server.port=80"
    #   - "traefik.http.services.imix-landing.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true