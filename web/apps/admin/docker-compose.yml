name: imix-admin

# Deployment stack for the Admin SPA (Vite + React) served by Nginx.
# Build context must be the pnpm workspace root (frontend/web) so the
# lockfile and workspace manifest are available.

services:
  admin:
    build:
      context: ../..                       # frontend/web (pnpm workspace root)
      dockerfile: apps/admin/Dockerfile
    image: imix-admin:latest
    restart: unless-stopped
    environment:
      # URL nginx uses to reach the backend API.
      # Inside dokploy-network the backend compose service `api` is reachable
      # by its service name. If Dokploy renames it with a suffix, override
      # API_UPSTREAM in the panel (e.g. http://api-<suffix>:8080).
      API_UPSTREAM: ${API_UPSTREAM:-http://api:8080}
    # No `ports:` mapping — Dokploy's Traefik reaches Nginx on port 80
    # through the shared dokploy-network. Configure the domain in the
    # Dokploy panel with Container Port = 80.
    expose:
      - "80"
    networks:
      - dokploy-network
    # Uncomment when using Dokploy's built-in Traefik:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.imix-admin.rule=Host(`admin.example.com`)"
    #   - "traefik.http.routers.imix-admin.entrypoints=websecure"
    #   - "traefik.http.routers.imix-admin.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.imix-admin.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
